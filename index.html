<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrudList</title>
    <link rel="stylesheet" href="./main.css">
</head>
<body>
    <div class="box">
        <h1>Javascript CrudList</h1>
        <form  class="form" id="form" onsubmit="add(event)">
            <label class="label">
                <input id="input" class="input" type="text" required placeholder="Enter names......">
            </label>
            <button class="button" onclick="add()">Add</button>
        </form>
        <ul id="list" class="list"></ul>
        
    </div>
    <script src="./main.js"></script>
</body>
</html>
